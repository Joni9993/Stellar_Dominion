name: Build and publish Docker images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ghcr.io/joni9993/stellar-dominion-server:latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_SERVER_URL=wss://stellardominion.tr4jon.com
          tags: ghcr.io/joni9993/stellar-dominion-client:latest
